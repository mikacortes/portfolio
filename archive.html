<!DOCTYPE html>

  </head>
  <body>
    <!-- HEADER -->
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html">Monica Cortes</a>
        <nav class="nav" aria-label="Primary">

    <main class="archive-main">
      <div class="container">
        <h1>Archive of Design Work</h1>

        <!--
          Each folder is clickable.
          Replace each href with the correct archive category page later.
        -->
        <div class="folder-stack">
          <a class="folder-link" href="#social-media" aria-label="Open Social Media archive">
            <div class="folder folder-light" style="--tab-left: 120px; --tab-width: 420px;">
              <span>Social Media</span>
            </div>

          <a class="folder-link" href="#graphic-design" aria-label="Open Graphic Design archive">
            <div class="folder folder-blue" style="--tab-left: 360px; --tab-width: 420px;">
              <span>Graphic Design</span>
            </div>
          </a>

          <a class="folder-link" href="#layout-design" aria-label="Open Layout Design archive">
            <div class="folder folder-light" style="--tab-left: 650px; --tab-width: 420px;">
              <span>Layout Design</span>
            </div>
          </a>

          <a class="folder-link" href="#ui-ux-design" aria-label="Open UI/UX Design archive">
            <div class="folder folder-blue" style="--tab-left: 920px; --tab-width: 420px;">
              <span>UI/UX Design</span>
            </div>

      </div>
